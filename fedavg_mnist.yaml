# configs/fedavg_mnist.yaml
# Baseline: FedAvg on MNIST, 10 clients, alpha=0.5
# Run: python main.py --config configs/fedavg_mnist.yaml

algorithm: fedavg
dataset: mnist
num_clients: 10
alpha: 0.5
num_rounds: 20
client_fraction: 0.5
local_epochs: 5
batch_size: 32
learning_rate: 0.01
momentum: 0.9
model_type: default
data_dir: ./data
results_dir: ./results

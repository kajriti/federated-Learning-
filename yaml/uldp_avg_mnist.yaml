algorithm: uldp_avg
dataset: mnist
num_clients: 10          # |S| = number of silos
alpha: 0.5
num_rounds: 20     # ULDP-AVG converges faster due to per-user training
client_fraction: 0.5
local_epochs: 5
local_epochs_per_user: 1 # Q = local epochs per user per round
batch_size: 32
learning_rate: 0.01
momentum: 0.9
model_type: default
user_sampling_rate: 1.0  # q = user sub-sampling probability (1.0 = no sub-sampling)
weighting_strategy: uniform  # "uniform" (w=1/|S|) or "optimal" (w based on record count)

dp:
  noise_multiplier: 1.0
  clipping_norm: 1.0
  delta: 0.00001

data_dir: ./data
results_dir: ./results

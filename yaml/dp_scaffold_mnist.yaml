# configs/dp_scaffold_mnist.yaml
# Paper 1: DP-SCAFFOLD on MNIST, 10 clients, alpha=0.5
# Run: python main.py --config configs/dp_scaffold_mnist.yaml

algorithm: dp_scaffold
dataset: mnist
num_clients: 10
alpha: 0.5
num_rounds: 20
client_fraction: 0.5    # l = 0.5 (user sampling ratio)
local_epochs: 5          # K = 5 (local updates per round)
batch_size: 32
learning_rate: 0.01      # eta_l (local learning rate)
global_lr: 1.0           # eta_g (global step size)
momentum: 0.9
model_type: default
data_sampling_ratio: 0.2 # s = 0.2 (data sampling ratio within client)

dp:
  noise_multiplier: 1.0  # sigma_g (try: 1.0, 2.0, 5.0)
  clipping_norm: 1.0     # C (gradient clipping bound)
  delta: 0.00001         # delta for (eps, delta)-DP

data_dir: ./data
results_dir: ./results

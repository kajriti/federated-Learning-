experiment_name: dp_scaffold
dataset: mnist
data_dir: ./data
num_clients: 10
client_fraction: 0.5
num_rounds: 100
alpha: 0.5
local_epochs: 5
batch_size: 32
optimizer: sgd
lr: 0.01
momentum: 0.9
weight_decay: 0.0
seed: 42
log_every: 5
save_results: true
results_dir: ./results
convergence_threshold: 0.80
# DP-SCAFFOLD specific
clip_threshold: 1.0
noise_sigma: 1.0
epsilon: 5.0
delta: 1.0e-5
use_warm_start: true
warm_start_rounds: 5
server_lr: 1.0
data_sampling_ratio: 0.2
user_sampling_ratio: 0.5
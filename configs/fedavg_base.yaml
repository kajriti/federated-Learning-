experiment_name: fedavg_baseline
dataset: mnist
data_dir: ./data
num_clients: 10
client_fraction: 0.5
num_rounds: 100
alpha: 0.5
local_epochs: 5
batch_size: 32
optimizer: sgd
lr: 0.01
momentum: 0.9
weight_decay: 0.0
seed: 42
log_every: 5
save_results: true
results_dir: ./results
convergence_threshold: 0.80